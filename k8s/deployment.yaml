apiVersion: apps/v1
kind: Deployment

metadata:
  name: kubernetes-webapp-deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: kubernetes-webapp

  template:
    metadata:
      labels:
        app: kubernetes-webapp

    spec:
      containers:
      - name: kubernetes-webapp

        image: shubhamdocker2025/kubernetes-webapp:v1

        ports:
        - containerPort: 80

        envFrom:
        - configMapRef:
            name: webapp-config

        - secretRef:
            name: webapp-secret

        resources:

          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "256Mi"

        livenessProbe:

          httpGet:
            path: /
            port: 80

          initialDelaySeconds: 10
          periodSeconds: 10

        readinessProbe:

          httpGet:
            path: /
            port: 80

          initialDelaySeconds: 5
          periodSeconds: 5